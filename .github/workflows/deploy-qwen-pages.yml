name: Deploy Trend2SKU Qwen Workbench

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "frontend/index-qwen-live.html"
      - "frontend/app-qwen-live.js"
      - "frontend/styles-qwen-live.css"
      - "frontend/assets/**"
      - "scripts/build_qwen_pages.py"
      - ".github/workflows/deploy-qwen-pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Build Qwen workbench frontend
        run: >-
          python3 scripts/build_qwen_pages.py --output _site
          --api-base "${{ vars.TREND2SKU_API_BASE }}"
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
